<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Private Chat</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- IMPORTANT: enables full-screen on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">
        <div class="chat-container">

            <!-- Header -->
            <div class="chat-header">
                <div class="header-left">
                    <div id="roomName"></div>
                    <div id="usernameDisplay"></div>
                    <div id="onlineUsers" class="online-users"></div> <!-- Added -->
                </div>

                <div class="menu">
                    <i onclick="toggleDropdown()">⋮</i>
                    <div class="dropdown" id="dropdown">
                        <p onclick="logout()">Logout</p>
                    </div>
                </div>
            </div>

            <!-- Messages -->
            <div class="chat-body" id="messages"></div>
            <div id="typingIndicator" class="typing-indicator" style="display:none;"></div>
            <!-- Reply Preview Box -->
            <div id="replyBox" class="reply-box" style="display:none;">
                <span id="replyText"></span>
                <button onclick="cancelReply()">✖</button>
            </div>

            <!-- Input -->
            <div class="chat-input">

                <!-- ✅ Attachment Button -->
                <button id="attachBtn" class="attach-btn"
                    onclick="document.getElementById('fileInput').click()">📎</button>
                <input type="file" id="fileInput" multiple style="display: none;"
                    accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt">

                <!-- ✅ Emoji Button -->
                <button id="emojiBtn" class="emoji-btn">😊</button>

                <!-- ✅ File Preview Container -->
                <div id="filePreviewContainer" class="file-preview-container">
                    <!-- ✅ View Once Toggle (inline with previews) -->
                    <div id="viewOnceContainer" class="view-once-simple-container" style="display: none;" title="Send as View Once">
                        <input type="checkbox" id="viewOnceCheckbox" class="view-once-simple-checkbox">
                        <label for="viewOnceCheckbox" class="view-once-simple-text">1</label>
                    </div>
                </div>

                <!-- ✅ Emoji Picker -->
                <div id="emojiPicker" class="emoji-picker">
                    <span>😀</span><span>😃</span><span>😄</span><span>😁</span>
                    <span>😆</span><span>😅</span><span>😂</span><span>🤣</span>
                    <span>😊</span><span>😇</span><span>😉</span><span>😍</span>
                    <span>🥰</span><span>😘</span><span>😜</span><span>🤪</span>
                    <span>🤩</span><span>👍</span><span>👎</span><span>👌</span>
                    <span>🙏</span><span>👏</span><span>💪</span><span>❤️</span>
                    <span>💔</span><span>🔥</span><span>🎉</span><span>😢</span>
                    <span>😭</span><span>😡</span><span>😎</span>
                </div>

                <!-- ✅ Mention Dropdown -->
                <div id="mentionDropdown" class="mention-dropdown"></div>

                <input id="msg" placeholder="Type a message..." onkeypress="pressEnter(event)" />

                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>

        </div>
    </div>

    <!-- ✅ Fullscreen Media Modal (View Once) -->
    <div id="mediaModal" class="media-modal" style="display: none;">
        <span class="close-modal" onclick="closeMediaModal()">&times;</span>
        <div id="mediaModalContent" class="modal-content"></div>
    </div>

    <!-- Supabase JS client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- JS -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
